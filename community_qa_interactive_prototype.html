  function renderTagSuggest(title){
    const suggestions = recommendTags(title).filter(id => !state.create.tags.includes(id)).slice(0,5);
    if(!title) return `<div class="notice">输入标题后会在这里显示智能标签推荐。</div>`;
    if(!suggestions.length) return `<div class="notice warn">暂未命中标签，可手动选择标签或继续完善标题。</div>`;
    return `<div class="notice"><b>推荐标签：</b>${suggestions.map(id=>`<button class="chip-btn" data-action="add-suggest-tag" data-id="${id}">#${esc(tagById(id).name)}</button>`).join('')}</div>`;
  }
  function recommendTags(title){
    const s = String(title||'').toLowerCase();
    const matches = [];
    data.tags.forEach(t => { if(s.includes(t.name.toLowerCase()) || (t.name==='Spring Boot' && s.includes('boot')) || (t.name==='算法' && s.includes('热榜')) || (t.name==='MySQL' && s.includes('表')) || (t.name==='Markdown' && s.includes('富文本'))) matches.push(t.id); });
    if(s.includes('vue') && !matches.includes(1)) matches.push(1);
    if(s.includes('审核') && !matches.includes(2)) matches.push(2);
    if(s.includes('base64') && !matches.includes(4)) matches.push(4);
    return [...new Set(matches)];
  }

  function renderQuestionDetail(id){

            <button class="mini-btn border" data-action="follow-user" data-id="${author.id}">${currentUser().following.includes(author.id)?'已关注作者':'关注作者'}</button>
            <button class="mini-btn border" data-action="open-report" data-type="question" data-id="${q.id}">举报</button>
            ${(q.userId===currentUser().id || isAdmin())?`<button class="mini-btn border" data-action="edit-question" data-id="${q.id}">编辑</button><button class="mini-btn border" data-action="confirm-delete-question" data-id="${q.id}">删除</button>`:''}

        </article>

          <div class="section-title"><h2>${answers.length} 个回答</h2><div class="tabs"><button class="tab-btn active" data-action="sort-answers" data-sort="vote">默认点赞</button><button class="tab-btn" data-action="sort-answers" data-sort="time">按时间</button></div></div>

          <div class="actions"><button class="primary-btn" data-action="submit-answer" data-id="${q.id}">提交回答审核</button><button class="secondary-btn" data-action="insert-base64-demo" data-id="${q.id}">插入 Base64 图片示例</button><button class="ghost-btn" data-action="save-answer-draft" data-id="${q.id}">保存草稿</button></div>
        </section>
      </div>
      <aside class="side-stack">
        <div class="card card-pad"><div class="section-title"><h3>相关问题</h3><span class="tag">同分类 + 标签重合</span></div>${related.length?related.map(r=>`<div class="side-item"><div class="rank">关</div><div><button style="background:transparent;text-align:left;padding:0;font-weight:750" data-action="view-question" data-id="${r.id}">${esc(r.title)}</button><div class="muted">${r.answerCount} 回答 · ${r.created.slice(5,10)}</div></div></div>`).join(''):'<div class="empty">暂无相关问题</div>'}</div>

  function hasAnswered(qid, uid){ return data.answers.some(a=>a.questionId===qid && a.userId===uid && a.status==='published'); }
  function relatedQuestions(q){
    return visibleQuestions().filter(x=>x.id!==q.id).map(x=>({q:x, rel:(x.categoryId===q.categoryId?2:0)+x.tags.filter(t=>q.tags.includes(t)).length*3})).filter(x=>x.rel>0).sort((a,b)=>b.rel-a.rel).map(x=>x.q);
  }
  function renderAnswer(a,q){
    const u = userById(a.userId);

    return `<article class="answer ${a.isAccepted?'accepted':''}">
      <div class="q-head"><div><div class="meta"><span class="avatar small">${esc(u.avatar)}</span><b>${esc(u.nickname)}</b>${a.isAccepted?'<span class="tag published">已采纳</span>':''}${statusTag(a.status)}<span>${esc(a.created)}</span></div><div class="content" style="margin-top:10px"><p>${esc(a.content)}</p></div></div></div>

  function renderComments(a, comments){

  function renderSearch(){
    const results = filterSearch();
    return `<section class="grid">
      <div class="card card-pad">
        <div class="section-title"><div><h2>搜索问题</h2><p>支持关键词、分类、标签和排序组合筛选。</p></div><button class="primary-btn" data-action="route" data-route="/question/create">我要提问</button></div>

        ${results.length?results.map(q=>renderQuestionCard(q)).join(''):'<div class="empty">未找到相关问题。<br><button class="secondary-btn" data-action="search-reset">清空筛选</button></div>'}
      </div>
      <aside class="side-stack">${renderCategoryCard()}<div class="card card-pad"><h3>热门标签</h3><div class="pill-row">${data.tags.sort((a,b)=>b.usage-a.usage).map(t=>`<button class="chip-btn" data-action="search-tag" data-id="${t.id}">#${esc(t.name)} ${t.usage}</button>`).join('')}</div></div></aside>
    </section>`;
  }
  function filterSearch(){
    let list = visibleQuestions();
    const kw = String(state.search.keyword||'').trim().toLowerCase();
    if(kw) list = list.filter(q => q.title.toLowerCase().includes(kw) || q.content.toLowerCase().includes(kw) || q.tags.some(id=>tagById(id).name.toLowerCase().includes(kw)));
    if(state.search.category !== 'all') list = list.filter(q => q.categoryId === Number(state.search.category));
    if(state.search.tag !== 'all') list = list.filter(q => q.tags.includes(Number(state.search.tag)));
    if(state.search.sort === 'time') return sortQuestions(list,'latest');
    if(state.search.sort === 'hot') return sortQuestions(list,'hot');
    return sortQuestions(list,'recommend');
  }

    </section>`;

  function hasSensitive(text){
    const s = String(text||'').toLowerCase();
    return data.sensitiveWords.filter(w=>w.status==='active').find(w=>s.includes(w.word.toLowerCase()));
  }
  function pushNotification(userId, type, sourceId, content){ data.notifications.unshift({id:nextId(data.notifications), userId, type, sourceId, content, isRead:false, created:formatNow()}); }
  function nextId(arr){ return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; }
  function formatNow(){ return '2026-06-23 10:' + String(Math.floor(Math.random()*50)+10).slice(0,2); }
  function toast(message, kind='success'){
    const root = document.getElementById('toast-root');
    const el = document.createElement('div'); el.className = `toast ${kind}`; el.textContent = message; root.appendChild(el);
    setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(()=>el.remove(),220); }, 2600);
  }
  function openModal(title, body, footer=''){

  }
  function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
  function confirmModal(title, message, confirmAction, attrs=''){

  document.addEventListener('click', function(e){

    if(t.id === 'createTitle') { state.create.title = t.value; const box=document.getElementById('tagSuggestBox'); if(box) box.innerHTML = renderTagSuggest(t.value); updateSensitiveLive(); }
    if(t.id === 'createContent') { state.create.content = t.value; updateSensitiveLive(); }
    if(t.id === 'answerDraft') { state.answerDrafts[t.dataset.question] = t.value; }
  });
  document.addEventListener('change', function(e){
    const t=e.target;
    if(t.id==='createCategory') state.create.category = t.value;
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && e.target.id === 'topKeyword') { e.preventDefault(); handleAction('top-search', e.target); }

  window.addEventListener('hashchange', render);

  function toggleQuestionLike(id){ const q=questionById(id); if(!q) return; q.liked=!q.liked; q.vote += q.liked?1:-1; if(q.liked) userById(q.userId).exp+=2; toast(q.liked?'点赞成功，计数已更新。':'已取消点赞。'); render(); }
  function toggleQuestionFavorite(id){ const q=questionById(id); if(!q) return; q.faved=!q.faved; q.favorite += q.faved?1:-1; toast(q.faved?'收藏成功。':'已取消收藏。'); render(); }
  function toggleAnswerLike(id){ const a=answerById(id); if(!a) return; a.liked=!a.liked; a.vote += a.liked?1:-1; if(a.liked) userById(a.userId).exp+=2; toast(a.liked?'回答点赞成功。':'已取消回答点赞。'); render(); }
  function toggleFollow(id){ id=Number(id); if(id===currentUser().id){ toast('不能关注自己。','warn'); return; } const u=currentUser(); const target=userById(id); const i=u.following.indexOf(id); if(i>=0){u.following.splice(i,1); target.followers=Math.max(0,target.followers-1); toast('已取消关注。');}else{u.following.push(id); target.followers+=1; pushNotification(id,'follow',u.id,`${u.nickname} 关注了你。`); toast('关注成功。');} render(); }
  function openReport(type,id){ openModal('提交举报', `<div class="field"><label>举报对象</label><input value="${esc(type)} #${esc(id)}" readonly /></div><div class="field"><label>举报原因</label><select id="reportReason"><option value="ad">广告</option><option value="porn">色情</option><option value="abuse">辱骂</option><option value="copyright">侵权</option><option value="other">其他</option></select></div><div class="field"><label>补充说明</label><textarea id="reportDetail" placeholder="可选，最多 500 字"></textarea></div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="submit-report" data-type="${esc(type)}" data-id="${esc(id)}">提交举报</button>`); }
  function submitReport(type,id){ const dup=data.reports.some(r=>r.reporterId===currentUser().id && r.targetType===type && r.targetId===Number(id)); if(dup){ toast('您已举报过该内容。','warn'); closeModal(); return; } data.reports.unshift({id:nextId(data.reports), reporterId:currentUser().id, targetType:type, targetId:Number(id), reason:document.getElementById('reportReason').value, detail:document.getElementById('reportDetail').value, status:'pending', created:formatNow(), resultNote:''}); toast('举报已提交，管理员会尽快处理。'); closeModal(); render(); }
  function loginSubmit(){ const name=document.getElementById('loginUsername').value.trim(); const pass=document.getElementById('loginPassword').value; const u=data.users.find(x=>x.username===name && (x.password===pass || pass==='123456' || (x.username==='admin'&&pass==='admin123'))); if(!u){ toast('用户名或密码错误。','error'); return; } if(u.status==='banned'){ toast('该用户已被封禁，无法登录。','error'); return; } state.currentUserId=u.id; toast('登录成功。'); navigate('/'); }
  function registerSubmit(){ const username=document.getElementById('regUsername').value.trim(); const nickname=document.getElementById('regNickname').value.trim() || username; const password=document.getElementById('regPassword').value; if(!username){ toast('用户名不能为空。','warn'); return; } if(password.length<6){ toast('密码至少 6 位。','warn'); return; } if(data.users.some(u=>u.username===username)){ toast('用户名已存在。','error'); return; } const id=nextId(data.users); data.users.push({id,username,password,nickname,role:'user',status:'active',avatar:nickname.slice(0,1),bio:'这个人刚加入社区。',exp:0,level:1,followers:0,following:[],badges:['registered']}); state.currentUserId=id; pushNotification(id,'achievement',0,'你解锁了徽章「初来乍到」。'); toast('注册成功，已解锁初来乍到。'); navigate('/user/'+id); }
  function saveCreateFromDom(){ state.create.title=document.getElementById('createTitle')?.value||state.create.title; state.create.content=document.getElementById('createContent')?.value||state.create.content; state.create.category=document.getElementById('createCategory')?.value||state.create.category; }
  function addCreateTag(id){ id=Number(id); if(!id) { toast('请先选择标签。','warn'); return; } if(state.create.tags.includes(id)){ toast('该标签已选择。','warn'); return; } if(state.create.tags.length>=5){ toast('标签最多选择 5 个。','warn'); return; } state.create.tags.push(id); toast('已添加标签：#'+tagById(id).name); render(); }
  function updateSensitiveLive(){ const el=document.getElementById('sensitiveLive'); if(!el) return; const hit=hasSensitive((state.create.title||'')+' '+(state.create.content||'')); if(hit){ el.className='notice danger'; el.innerHTML='实时检测：内容包含不当用语「'+esc(hit.word)+'」，请修改。'; } else { el.className='notice success'; el.textContent='实时检测：当前未发现敏感词。可输入「违规词」体验拦截。'; } }
  function searchInviteUsers(){ const kw=(document.getElementById('inviteKeyword')?.value||'').trim().toLowerCase(); const result=document.getElementById('inviteResult'); if(!result) return; const users=data.users.filter(u=>u.id!==currentUser().id && u.status==='active' && (!kw || u.nickname.toLowerCase().includes(kw) || u.username.toLowerCase().includes(kw))).slice(0,5); result.innerHTML=users.length?users.map(u=>`<button class="chip-btn" data-action="invite-user" data-id="${u.id}">${esc(u.nickname)} · Lv.${u.level}</button>`).join(''):'<span class="muted">未找到可邀请用户</span>'; }
  function inviteUser(id){ id=Number(id); if(id===currentUser().id){ toast('不能邀请自己。','warn'); return; } if(state.create.invited.includes(id)){ toast('已邀请该用户。','warn'); return; } if(state.create.invited.length>=3){ toast('每个问题最多邀请 3 人。','warn'); return; } state.create.invited.push(id); toast('已邀请 '+userById(id).nickname); render(); }
  function previewQuestion(){ saveCreateFromDom(); openModal('问题预览', `<h2>${esc(state.create.title||'未填写标题')}</h2><p>${esc(state.create.content||'未填写正文')}</p><div>${state.create.tags.map(id=>tagHtml(id,false)).join('')}</div><div class="notice">分类：${state.create.category?esc(categoryById(state.create.category).name):'未选择'}；邀请：${state.create.invited.map(id=>esc(userById(id).nickname)).join('、')||'无'}</div>`, `<button class="ghost-btn" data-action="close-modal">继续编辑</button><button class="primary-btn" data-action="submit-question">提交审核</button>`); }
  function submitQuestion(){ saveCreateFromDom(); if(!state.create.title.trim()){ toast('标题不能为空。','warn'); return; } if(!state.create.category){ toast('分类必选。','warn'); return; } const hit=hasSensitive(state.create.title+' '+state.create.content); if(hit){ toast('内容包含不当用语，请修改：'+hit.word,'error'); return; } const id=nextId(data.questions); data.questions.unshift({id,title:state.create.title.trim(),content:state.create.content.trim()||'作者暂未补充正文。',userId:currentUser().id,categoryId:Number(state.create.category),tags:[...state.create.tags],view:0,answerCount:0,vote:0,favorite:0,status:'pending',featured:false,pinned:false,created:formatNow(),updated:formatNow(),liked:false,faved:false,acceptedAnswerId:null,invited:[...state.create.invited]}); currentUser().exp+=1; if(!currentUser().badges.includes('first_question')) currentUser().badges.push('first_question'); state.create={title:'',content:'',category:'',tags:[],invited:[]}; toast('问题已提交审核，当前仅作者和管理员可见。'); closeModal(); navigate('/question/'+id); }
  function insertBase64Demo(qid){ const el=document.getElementById('answerDraft'); if(!el) return; const demo='\n\n![示例图片](data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...)'; el.value += demo; state.answerDrafts[qid]=el.value; toast('已插入 Base64 图片占位示例。'); }
  function saveAnswerDraft(qid){ const el=document.getElementById('answerDraft'); state.answerDrafts[qid]=el?.value||''; toast('回答草稿已保存。'); }
  function submitAnswer(qid){ const text=document.getElementById('answerDraft')?.value.trim() || state.answerDrafts[qid] || ''; if(!text){ toast('回答正文不能为空。','warn'); return; } const hit=hasSensitive(text); if(hit){ toast('内容包含不当用语，请修改：'+hit.word,'error'); return; } const q=questionById(qid); const id=nextId(data.answers); data.answers.unshift({id,questionId:Number(qid),userId:currentUser().id,content:text,vote:0,status:'pending',isAccepted:false,created:formatNow(),liked:false}); q.answerCount += 1; currentUser().exp += 3; if(!currentUser().badges.includes('first_answer')) currentUser().badges.push('first_answer'); pushNotification(q.userId,'new_answer',q.id,`${currentUser().nickname} 提交了一个待审核回答。`); state.answerDrafts[qid]=''; toast('回答已提交审核，通过后公开展示。'); render(); }
  function submitComment(aid){ const el=document.getElementById('commentDraft_'+aid); const text=el?.value.trim()||''; if(!text){ toast('评论不能为空。','warn'); return; } if(text.length>500){ toast('评论最多 500 字。','warn'); return; } const hit=hasSensitive(text); if(hit){ toast('内容包含不当用语，请修改：'+hit.word,'error'); return; } data.comments.push({id:nextId(data.comments),answerId:Number(aid),userId:currentUser().id,parentId:null,content:text,created:formatNow(),status:'published'}); state.commentDrafts[aid]=''; toast('评论已发布。'); render(); }
  function submitReply(cid){ const c=commentById(cid); const el=document.getElementById('replyInput_'+cid); const text=el?.value.trim()||''; if(!text){ toast('回复不能为空。','warn'); return; } const hit=hasSensitive(text); if(hit){ toast('内容包含不当用语，请修改：'+hit.word,'error'); return; } data.comments.push({id:nextId(data.comments),answerId:c.answerId,userId:currentUser().id,parentId:Number(cid),content:text,created:formatNow(),status:'published'}); state.replyTarget=null; toast('回复已发布。'); render(); }
  function deleteComment(id){ const c=commentById(id); if(c) c.status='deleted'; toast('评论已删除。'); render(); }
  function acceptAnswer(id){ const a=answerById(id); const q=questionById(a.questionId); if(q.acceptedAnswerId){ toast('该问题已采纳过回答。','warn'); return; } a.isAccepted=true; q.acceptedAnswerId=a.id; userById(a.userId).exp += 10; if(!userById(a.userId).badges.includes('first_accepted')) userById(a.userId).badges.push('first_accepted'); pushNotification(a.userId,'accepted',a.id,`你的回答被 ${currentUser().nickname} 采纳，经验值 +10。`); toast('已采纳回答，回答将置顶展示。'); render(); }
  function editQuestion(id){ const q=questionById(id); openModal('编辑问题', `<div class="field"><label>标题</label><input id="editQuestionTitle" value="${esc(q.title)}" /></div><div class="field"><label>正文</label><textarea id="editQuestionContent">${esc(q.content)}</textarea></div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-edit-question" data-id="${q.id}">保存</button>`); }
  function saveEditQuestion(id){ const q=questionById(id); const title=document.getElementById('editQuestionTitle').value.trim(); const content=document.getElementById('editQuestionContent').value.trim(); if(!title){ toast('标题不能为空。','warn'); return; } const hit=hasSensitive(title+' '+content); if(hit){ toast('内容包含不当用语，请修改：'+hit.word,'error'); return; } q.title=title; q.content=content; if(q.status==='rejected') q.status='pending'; q.updated=formatNow(); toast(q.status==='pending'?'已保存并重新进入审核。':'问题已保存。'); closeModal(); render(); }
  function deleteQuestion(id){ const q=questionById(id); if(q) q.status='deleted'; closeModal(); toast('问题已软删除。'); navigate('/'); }
  function editAnswer(id){ const a=answerById(id); openModal('编辑回答', `<div class="field"><label>回答正文</label><textarea id="editAnswerContent" style="min-height:180px">${esc(a.content)}</textarea></div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-edit-answer" data-id="${a.id}">保存</button>`); }
  function saveEditAnswer(id){ const a=answerById(id); const content=document.getElementById('editAnswerContent').value.trim(); if(!content){ toast('回答正文不能为空。','warn'); return; } const hit=hasSensitive(content); if(hit){ toast('内容包含不当用语，请修改：'+hit.word,'error'); return; } a.content=content; if(a.status==='rejected') a.status='pending'; toast(a.status==='pending'?'回答已重新进入审核。':'回答已保存。'); closeModal(); render(); }
  function deleteAnswer(id){ const a=answerById(id); if(a) a.status='deleted'; closeModal(); toast('回答已删除。'); render(); }
  function submitSearch(){ state.search.keyword=document.getElementById('searchKeyword')?.value||''; state.search.category=document.getElementById('searchCategory')?.value||'all'; state.search.tag=document.getElementById('searchTag')?.value||'all'; state.search.sort=document.getElementById('searchSort')?.value||'relevance'; render(); }
  function editProfile(id){ const u=userById(id); openModal('编辑资料', `<div class="field"><label>头像字符</label><input id="profileAvatar" value="${esc(u.avatar)}" maxlength="2" /></div><div class="field"><label>昵称</label><input id="profileNickname" value="${esc(u.nickname)}" /></div><div class="field"><label>简介</label><textarea id="profileBio">${esc(u.bio)}</textarea><small>正式开发中头像为 Base64，最大 500KB。</small></div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-profile" data-id="${u.id}">保存资料</button>`); }
  function saveProfile(id){ const u=userById(id); u.avatar=document.getElementById('profileAvatar').value.trim().slice(0,2)||u.avatar; u.nickname=document.getElementById('profileNickname').value.trim()||u.nickname; u.bio=document.getElementById('profileBio').value.trim(); toast('个人资料已保存。'); closeModal(); render(); }
  function changePassword(){ openModal('修改密码', '<div class="field"><label>原密码</label><input type="password" placeholder="请输入原密码" /></div><div class="field"><label>新密码</label><input type="password" placeholder="至少 6 位" /></div><div class="field"><label>确认新密码</label><input type="password" placeholder="再次输入" /></div>', '<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-password">保存密码</button>'); }
  function toggleNotification(id){ const n=data.notifications.find(x=>x.id===Number(id)); if(n){ n.isRead=!n.isRead; toast(n.isRead?'已标记为已读。':'已标记为未读。'); render(); } }
  function deleteNotification(id){ const i=data.notifications.findIndex(x=>x.id===Number(id)); if(i>=0) data.notifications.splice(i,1); toast('通知已删除。'); render(); }
  function goNotification(id){ const n=data.notifications.find(x=>x.id===Number(id)); if(!n) return; n.isRead=true; if(n.type==='new_answer'||n.type==='audit_reject'||n.type==='invite') navigate('/question/'+n.sourceId); else if(n.type==='accepted'){ const a=answerById(n.sourceId); navigate('/question/'+(a?.questionId||101)); } else navigate('/notifications'); }
  function openLog(id){ const l=data.auditLogs.find(x=>x.id===Number(id)); openModal('操作日志详情', `<p><b>操作：</b>${esc(l.action)}</p><p><b>管理员：</b>${esc(l.operator)}</p><p><b>目标：</b>${esc(l.target)}</p><p><b>时间：</b>${esc(l.time)}</p>`, '<button class="primary-btn" data-action="close-modal">关闭</button>'); }
  function previewReview(type,id){ const item = type==='question'?questionById(id):answerById(id); openModal('审核预览', `<p><b>类型：</b>${type==='question'?'问题':'回答'}</p><p><b>标题/内容：</b>${esc(type==='question'?item.title:item.content)}</p><p><b>状态：</b>${statusText(item.status)}</p>`, `<button class="success-btn" data-action="admin-approve" data-type="${type}" data-id="${id}">通过</button><button class="warning-btn" data-action="admin-reject" data-type="${type}" data-id="${id}">驳回</button>`); }
  function adminApprove(type,id){ const item=type==='question'?questionById(id):answerById(id); item.status='published'; item.updated=formatNow(); const uid=item.userId; pushNotification(uid,'audit_pass',Number(id),`${type==='question'?'问题':'回答'} #${id} 审核通过。`); data.auditLogs.unshift({id:nextId(data.auditLogs),action:'audit_pass',operator:currentUser().nickname,target:`${type} #${id}`,time:formatNow()}); toast('审核已通过，内容公开可见。'); closeModal(); render(); }
  function adminReject(type,id){ openModal('填写驳回原因', `<div class="field"><label>驳回原因 <span class="muted">必填</span></label><textarea id="rejectReason" placeholder="请说明需要修改的原因"></textarea></div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="warning-btn" data-action="confirm-admin-reject" data-type="${type}" data-id="${id}">确认驳回</button>`); }
  function confirmAdminReject(type,id){ const reason=document.getElementById('rejectReason').value.trim(); if(!reason){ toast('驳回原因必填。','warn'); return; } const item=type==='question'?questionById(id):answerById(id); item.status='rejected'; item.auditReason=reason; pushNotification(item.userId,'audit_reject',type==='question'?Number(id):item.questionId,`${type==='question'?'问题':'回答'} #${id} 被驳回：${reason}`); data.auditLogs.unshift({id:nextId(data.auditLogs),action:'audit_reject',operator:currentUser().nickname,target:`${type} #${id}`,time:formatNow()}); toast('已驳回并通知作者。'); closeModal(); render(); }
  function viewReport(id){ const r=data.reports.find(x=>x.id===Number(id)); const owner=targetOwner(r); openModal('举报详情', `<p><b>举报者：</b>${esc(userById(r.reporterId).nickname)}</p><p><b>目标：</b>${esc(r.targetType)} #${r.targetId}</p><p><b>目标作者：</b>${owner?esc(userById(owner).nickname):'未知'}</p><p><b>原因：</b>${esc(reasonText(r.reason))}</p><p><b>说明：</b>${esc(r.detail)}</p><p><b>状态：</b>${statusText(r.status)}</p>`, `<button class="ghost-btn" data-action="close-modal">关闭</button>${r.status==='pending'?`<button class="success-btn" data-action="admin-ignore-report" data-id="${r.id}">忽略</button><button class="danger-btn" data-action="admin-delete-report-content" data-id="${r.id}">删除内容</button><button class="warning-btn" data-action="admin-ban-report-user" data-id="${r.id}">封禁作者</button>`:''}`); }
  function handleReport(id,status){ const r=data.reports.find(x=>x.id===Number(id)); r.status=status; r.resultNote=status==='ignored'?'未发现违规':status==='deleted_content'?'内容已软删除':'作者已封禁'; if(status==='deleted_content'){ if(r.targetType==='question') questionById(r.targetId).status='deleted'; if(r.targetType==='answer') answerById(r.targetId).status='deleted'; if(r.targetType==='comment') commentById(r.targetId).status='deleted'; }
    if(status==='banned_user'){ const uid=targetOwner(r); if(uid) userById(uid).status='banned'; }
    pushNotification(r.reporterId,'report_result',r.id,'你的举报已处理：'+r.resultNote); toast('举报已处理：'+r.resultNote); closeModal(); render(); }
  function reopenReport(id){ const r=data.reports.find(x=>x.id===Number(id)); r.status='pending'; r.resultNote=''; toast('举报已重新打开。'); render(); }
  function openCreateUser(){ openModal('新增用户', '<div class="field"><label>用户名</label><input id="newUsername" /></div><div class="field"><label>昵称</label><input id="newNickname" /></div><div class="field"><label>角色</label><select id="newRole"><option value="user">普通用户</option><option value="admin">管理员</option></select></div>', '<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-create-user">保存用户</button>'); }
  function saveCreateUser(){ const username=document.getElementById('newUsername').value.trim(); const nickname=document.getElementById('newNickname').value.trim()||username; if(!username){toast('用户名不能为空。','warn');return;} if(data.users.some(u=>u.username===username)){toast('用户名已存在。','error');return;} const id=nextId(data.users); data.users.push({id,username,password:'123456',nickname,role:document.getElementById('newRole').value,status:'active',avatar:nickname.slice(0,1),bio:'管理员创建的测试用户。',exp:0,level:1,followers:0,following:[],badges:['registered']}); toast('用户已创建，默认密码 123456。'); closeModal(); render(); }
  function viewUser(id){ const u=userById(id); openModal('用户详情', `<p><b>${esc(u.nickname)}</b> @${esc(u.username)}</p><p>角色：${u.role}；状态：${statusText(u.status)}</p><p>经验：${u.exp}；等级：Lv.${u.level}</p><p>简介：${esc(u.bio)}</p>`, `<button class="secondary-btn" data-action="route" data-route="/user/${u.id}">打开主页</button><button class="primary-btn" data-action="close-modal">关闭</button>`); }
  function banUser(id){ userById(id).status='banned'; data.auditLogs.unshift({id:nextId(data.auditLogs),action:'ban_user',operator:currentUser().nickname,target:'用户 '+userById(id).nickname,time:formatNow()}); closeModal(); toast('用户已封禁。'); render(); }
  function unbanUser(id){ userById(id).status='active'; toast('用户已解封。'); render(); }
  function togglePin(id){ const q=questionById(id); q.pinned=!q.pinned; toast(q.pinned?'已置顶。':'已取消置顶。'); render(); }
  function toggleFeatured(id){ const q=questionById(id); if(q.status!=='published'){ toast('仅已发布问题可加精。','warn'); return; } q.featured=!q.featured; toast(q.featured?'已标记为精华。':'已取消精华。'); render(); }
  function openCategoryModal(id,parent){ let c=null; if(id){ c=allCategories().find(x=>x.id===Number(id)); } openModal(c?'编辑分类':'新增分类', `<div class="field"><label>分类名称</label><input id="categoryName" value="${esc(c?.name||'')}" /></div><div class="notice">${parent?'父分类：'+esc(categoryById(parent).name):c?.parentId?'父分类：'+esc(categoryById(c.parentId).name):'一级分类'}</div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-category" data-id="${id||''}" data-parent="${parent||c?.parentId||''}">保存分类</button>`); }
  function saveCategory(id,parent){ const name=document.getElementById('categoryName').value.trim(); if(!name){ toast('分类名称不能为空。','warn'); return; } if(id){ const c=allCategories().find(x=>x.id===Number(id)); c.name=name; toast('分类已更新。'); } else if(parent){ const p=data.categories.find(x=>x.id===Number(parent)); p.children.push({id:nextId(allCategories()),name,parentId:Number(parent),count:0}); toast('子分类已新增。'); } else { data.categories.push({id:nextId(data.categories),name,parentId:null,count:0,children:[]}); toast('一级分类已新增。'); } closeModal(); render(); }
  function deleteCategory(id){ const cid=Number(id); const hasPublished=data.questions.some(q=>q.categoryId===cid && q.status==='published'); if(hasPublished){ toast('该分类下有已发布问题，无法删除。','error'); return; } for(const c of data.categories){ const i=c.children.findIndex(ch=>ch.id===cid); if(i>=0){ c.children.splice(i,1); toast('子分类已删除。'); render(); return; } } const i=data.categories.findIndex(c=>c.id===cid); if(i>=0){ if(data.categories[i].children.some(ch=>data.questions.some(q=>q.categoryId===ch.id && q.status==='published'))){ toast('子分类下有已发布问题，无法删除。','error'); return; } data.categories.splice(i,1); toast('分类及子分类已级联删除。'); render(); } }
  function openTagModal(id){ const t=data.tags.find(x=>x.id===Number(id)); openModal(t?'编辑标签':'新增标签', `<div class="field"><label>标签名称</label><input id="tagName" value="${esc(t?.name||'')}" /></div>`, `<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-tag" data-id="${id||''}">保存标签</button>`); }
  function saveTag(id){ const name=document.getElementById('tagName').value.trim(); if(!name){toast('标签名称不能为空。','warn'); return;} if(data.tags.some(t=>t.name===name && t.id!==Number(id))){toast('标签名称已存在。','error'); return;} if(id){ data.tags.find(t=>t.id===Number(id)).name=name; toast('标签已更新。'); } else { data.tags.push({id:nextId(data.tags),name,usage:0}); toast('标签已新增。'); } closeModal(); render(); }
  function deleteTag(id){ id=Number(id); if(data.questions.some(q=>q.tags.includes(id))){ toast('已有问题使用该标签，原型中禁止删除。','error'); return; } const i=data.tags.findIndex(t=>t.id===id); if(i>=0) data.tags.splice(i,1); toast('标签已删除。'); render(); }
  function openSensitiveModal(){ openModal('新增敏感词', '<div class="field"><label>敏感词</label><input id="sensitiveWord" placeholder="输入词条，精确匹配" /></div>', '<button class="ghost-btn" data-action="close-modal">取消</button><button class="primary-btn" data-action="save-sensitive">保存敏感词</button>'); }
  function saveSensitive(){ const word=document.getElementById('sensitiveWord').value.trim(); if(!word){toast('敏感词不能为空。','warn');return;} if(data.sensitiveWords.some(w=>w.word.toLowerCase()===word.toLowerCase())){toast('敏感词已存在。','error');return;} data.sensitiveWords.push({id:nextId(data.sensitiveWords),word,status:'active'}); toast('敏感词已添加并立即生效。'); closeModal(); render(); }
  function toggleSensitive(id){ const w=data.sensitiveWords.find(x=>x.id===Number(id)); w.status=w.status==='active'?'disabled':'active'; toast(w.status==='active'?'敏感词已启用。':'敏感词已禁用。'); render(); }
  function deleteSensitive(id){ const i=data.sensitiveWords.findIndex(w=>w.id===Number(id)); if(i>=0) data.sensitiveWords.splice(i,1); toast('敏感词已删除。'); render(); }
  function exportData(type){
    let rows=[];
    if(type==='users') rows=[['id','username','nickname','role','status','exp'],...data.users.map(u=>[u.id,u.username,u.nickname,u.role,u.status,u.exp])];
    if(type==='questions') rows=[['id','title','status','category','vote','favorite'],...data.questions.map(q=>[q.id,q.title,q.status,categoryById(q.categoryId).name,q.vote,q.favorite])];
    if(type==='answers') rows=[['id','question_id','user','status','vote'],...data.answers.map(a=>[a.id,a.questionId,userById(a.userId).nickname,a.status,a.vote])];
    if(type==='logs') rows=[['id','action','operator','target','time'],...data.auditLogs.map(l=>[l.id,l.action,l.operator,l.target,l.time])];
    const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`${type}_export_demo.csv`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast('已生成导出演示文件：'+type+'_export_demo.csv');
  }

  render();
})();
</script>
</body>
