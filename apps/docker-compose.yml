name: fullstack-app-starter

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullstack-backend
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-docker:3306/template_db?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-fullstack-app-starter-jwt-secret-key-2025}
      AUTH_TOKEN_TTL_SECONDS: 604800
    networks:
      - app-network
      - shared-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fullstack-frontend
    ports:
      - "9999:9999"
    environment:
      VITE_PROXY_BACKEND: http://backend:8888
      VITE_PROXY_AI: http://aiassistant:8000
    depends_on:
      - backend
      - aiassistant
    networks:
      - app-network

  aiassistant:
    build:
      context: ./aiassistant
      dockerfile: Dockerfile
    container_name: fullstack-aiassistant
    ports:
      - "8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AI_CORS_ORIGINS: ${AI_CORS_ORIGINS:-http://localhost:9999,http://127.0.0.1:9999}
    networks:
      - app-network

networks:
  app-network:
  shared-network:
    external: true
