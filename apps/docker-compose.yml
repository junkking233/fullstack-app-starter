name: ${COMPOSE_PROJECT_NAME:?COMPOSE_PROJECT_NAME is required; copy apps/.env.example to apps/.env}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-docker:3306/${APP_DB_NAME:?APP_DB_NAME is required; copy apps/.env.example to apps/.env}?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required; copy apps/.env.example to apps/.env}
      AUTH_TOKEN_TTL_SECONDS: 604800
    networks:
      - app-network
      - shared-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9999:9999"
    environment:
      VITE_PROXY_BACKEND: http://backend:8888
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  aiassistant:
    profiles:
      - ai
    build:
      context: ./aiassistant
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AI_CORS_ORIGINS: ${AI_CORS_ORIGINS:-http://localhost:9999,http://127.0.0.1:9999}
    networks:
      - app-network

networks:
  app-network:
  shared-network:
    external: true
