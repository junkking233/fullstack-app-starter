services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: template-backend
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-docker:3306/template_db?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
    networks:
      - app-network
      - shared-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: template-frontend
    ports:
      - "9999:9999"
    environment:
      VITE_PROXY_BACKEND: http://backend:8888
      VITE_PROXY_AI: http://ai-service:8000
    depends_on:
      - backend
      - ai-service
    networks:
      - app-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: template-ai-service
    ports:
      - "8000:8000"
    env_file:
      - path: ./ai-service/.env
        required: false
    networks:
      - app-network

networks:
  app-network:
  shared-network:
    external: true
