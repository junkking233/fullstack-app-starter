services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: zhiqu-community-backend
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-docker:3306/zhiqu_community?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-zhiqu-community-jwt-secret-key-2024}
      AUTH_TOKEN_TTL_SECONDS: 604800
    networks:
      - app-network
      - shared-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: zhiqu-community-frontend
    ports:
      - "9999:9999"
    environment:
      VITE_PROXY_BACKEND: http://backend:8888
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
  shared-network:
    external: true
